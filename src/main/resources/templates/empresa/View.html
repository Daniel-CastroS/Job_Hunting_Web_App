<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InfoEmpresa</title>

        table {border-collapse: collapse; width: 100%; }
        th, td {padding: 8px; text-align: left; border-bottom: 1px solid gray; }
        tr:hover {background-color: #f5f5f5;}
    </style>
</head>
<body>
<header>Empresas</header>
<div class="centered">
    <table style="border: 1px solid blue">
        <tr> <th>Id</th> <th>Nombre</th><th>...</th></tr>

            <td th:text="${empresa.id}"></td>
            <td th:text="${empresa.nombre}"></td>
            <td><a th:text="..."></a></td>
        </tr>
    </table>
</div>
<footer>Mi pagina</footer>
</body>
</html>
